name: Build



on:
  push:
    branches:
      - main
      - master

  pull_request:

  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - run: go mod download
      
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxtst-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxkbcommon-dev

            - name: Build
            
              run: go build -v ./cmd/mousewalk